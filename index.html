<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ARフォト</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="debug-panel">
        精度: 取得中...<br>
        座標: 0, 0<br>
        枚数: <span id="photo-count">0</span>枚
    </div>

    <div id="start-screen">
        <h1>写真AR</h1>
        <p>タップしてスタート</p>
        <div id="start-user-links"></div>
    </div>

    <div class="ui-container" id="main-ui">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <label for="fileInput" id="fileLabel">① 写真を選ぶ</label>
        <button id="shotBtn" type="button">📸 保存</button>
        <button id="mapBtn" type="button">🗺️ 地図</button>
        <button id="clearBtn" type="button" class="btn-danger">消去</button>
    </div>

    <!-- 地図オーバーレイ -->
    <div id="ar-map-overlay">
        <div id="ar-map-header">
            <span>📍 写真マップ</span>
            <button id="ar-map-close">✕ AR に戻る</button>
        </div>
        <div id="ar-map"></div>
    </div>

    <!-- レーダー -->
    <canvas id="radar" width="90" height="90"></canvas>

    <!-- 写真タップ時のライトボックス -->
    <div id="photo-lightbox">
        <button id="lightbox-close">✕</button>
        <img id="lightbox-img" src="" alt="写真">
        <div id="lightbox-comment"></div>
        <div id="lightbox-coords"></div>
    </div>

<a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; preserveDrawingBuffer: true;"
    >
      <a-camera id="myCamera" gps-camera="minDistance: 0;" rotation-reader></a-camera>
    </a-scene>

    <script src="js/photoar.js"></script>
</body>
</html>
